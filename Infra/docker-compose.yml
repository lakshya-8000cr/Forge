name: forge

services:

  postgres:
    image: postgres:16

    container_name: forge-postgres

    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge123
      POSTGRES_DB: forge

    ports:
      - "5432:5432"

    volumes:
      - forge_data:/var/lib/postgresql/data


  backend:
    build: ../Backend

    container_name: forge-backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:

      POSTGRES_HOST: postgres

      POSTGRES_PORT: 5432

      POSTGRES_USER: forge

      POSTGRES_PASSWORD: forge123

      POSTGRES_DB: forge


  frontend:
    build: ../frontend

    container_name: forge-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend


volumes:

  forge_data: