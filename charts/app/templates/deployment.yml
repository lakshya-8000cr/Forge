apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.appName }}
  labels:
    managed-by: forge
    app: {{ .Values.appName }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ .Values.appName }}

  template:
    metadata:
      labels:
        managed-by: forge
        app: {{ .Values.appName }}

    spec:
      containers:
        - name: {{ .Values.appName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}