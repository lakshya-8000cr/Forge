apiVersion: apps/v1
kind: Deployment

metadata:
  name: forge-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: forge-backend

  template:
    metadata:
      labels:
        app: forge-backend

    spec:
      serviceAccountName: forge-backend-sa

      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.backend.port }}

          env:
            - name: POSTGRES_HOST
              value: forge-postgres

            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}

            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}

            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}

            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}

          # 🏎️ FIXED REALIGNMENT: Fits smoothly inside your t3.small instances
          resources:
            requests:
              cpu: "200m"      # 0.2 Cores baseline allocation
              memory: "256Mi"  # 256 Megabytes startup requirement
            limits:
              cpu: "1"         # Max burst capability up to 1 full Core under load
              memory: "1Gi"    # Absolute cap for the worker queue