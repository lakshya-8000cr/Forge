apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: forge-backend-clusterrolebinding

subjects:
  - kind: ServiceAccount
    name: forge-backend-sa
    namespace: default

roleRef:
  kind: ClusterRole
  name: forge-backend-clusterrole
  apiGroup: rbac.authorization.k8s.io