apiVersion: apps/v1
kind: Deployment

metadata:
  name: forge-frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: forge-frontend

  template:
    metadata:
      labels:
        app: forge-frontend

    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.frontend.port }}

          # 🏎️ FRONTEND OPTIMIZATION: Ultra-light footprint to avoid hardware exhaustion
          resources:
            requests:
              cpu: "100m"      # 0.1 Cores baseline allocation
              memory: "128Mi"  # 128 Megabytes startup allocation
            limits:
              cpu: "500m"      # Max burst capability up to 0.5 Cores
              memory: "256Mi"  # Absolute cap for browser operations