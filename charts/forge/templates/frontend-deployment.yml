apiVersion: apps/v1
kind: Deployment

metadata:
  name: forge-frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: forge-frontend

  template:
    metadata:
      labels:
        app: forge-frontend

    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.frontend.port }}