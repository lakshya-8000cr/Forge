apiVersion: rbac.authorization.k8s.io/v1

kind: ClusterRole

metadata:

  name: forge-helm-role

rules:

- apiGroups: [""]

  resources:

    - pods
    - services
    - secrets
    - configmaps
    - namespaces

  verbs:

    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["apps"]

  resources:

    - deployments
    - replicasets

  verbs:

    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["networking.k8s.io"]

  resources:

    - ingresses
    
  verbs:

    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete